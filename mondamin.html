<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Marker App</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .map-page {
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }

    .map-panel {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .map-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #fff;
      cursor: grab;
      user-select: none;
    }

    .map-viewport.dragging {
      cursor: grabbing;
    }

    .map-stage {
      position: relative;
      transform-origin: top left;
    }

    .map-image {
      display: block;
      max-width: none;
      -webkit-user-drag: none;
      user-select: none;
      pointer-events: auto;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      background: transparent;
      border: none;
      padding: 0;
      z-index: 10;
      pointer-events: none;
    }

    .marker-pin {
      width: 18px;
      height: 18px;
      border-radius: 50% 50% 50% 0;
      background: #dc2626;
      transform: rotate(-45deg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      margin: 0 auto;
      position: relative;
    }

    .marker-pin::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      top: 5px;
      left: 5px;
    }

    .marker-label {
      margin-top: 6px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="map-page">
    <div class="map-panel">
      <div id="viewport" class="map-viewport">
        <div id="stage" class="map-stage">
          <img id="mapImage" class="map-image" alt="Map" />
          <div id="markersLayer"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="markerApi.js"></script>
  <script>
    const ACTUAL_IMAGE_SRC = "mondamin_map.png";
    const IMAGE_WIDTH = 2048;
    const IMAGE_HEIGHT = 1280;
    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 5;
    const ZOOM_STEP = 0.25;
    const MARKERS_API_URL = "https://capacitor08.github.io/samplear/api/markers_xy.json";
    const REFRESH_MS = 5000;

    let zoom = 1;
    let fitZoom = 1;
    let markers = [];
    let isDragging = false;
    let dragMoved = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startScrollLeft = 0;
    let startScrollTop = 0;

    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");
    const mapImage = document.getElementById("mapImage");
    const markersLayer = document.getElementById("markersLayer");

    const markerApi = MarkerApi.create({
      apiUrl: MARKERS_API_URL,
      refreshMs: REFRESH_MS,
      imageWidth: IMAGE_WIDTH,
      imageHeight: IMAGE_HEIGHT
    });

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getFitZoom() {
      const availableWidth = viewport.clientWidth || 1;
      const availableHeight = viewport.clientHeight || 1;
      const scaleX = availableWidth / IMAGE_WIDTH;
      const scaleY = availableHeight / IMAGE_HEIGHT;
      return Math.min(scaleX, scaleY);
    }

    function getMinAllowedZoom() {
      return fitZoom;
    }

    function updateStageSize() {
      stage.style.width = (IMAGE_WIDTH * zoom) + "px";
      stage.style.height = (IMAGE_HEIGHT * zoom) + "px";
      mapImage.style.width = (IMAGE_WIDTH * zoom) + "px";
      mapImage.style.height = (IMAGE_HEIGHT * zoom) + "px";
    }

    function centerViewport() {
      const contentWidth = IMAGE_WIDTH * zoom;
      const contentHeight = IMAGE_HEIGHT * zoom;
      viewport.scrollLeft = Math.max(0, (contentWidth - viewport.clientWidth) / 2);
      viewport.scrollTop = Math.max(0, (contentHeight - viewport.clientHeight) / 2);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMarkers() {
      markersLayer.innerHTML = "";

      markers.forEach((marker, index) => {
        const el = document.createElement("div");
        el.className = "marker";
        el.style.left = (marker.x * zoom) + "px";
        el.style.top = (marker.y * zoom) + "px";
        el.title = `${marker.label} (${marker.x}, ${marker.y})`;

        el.innerHTML = `
          <div class="marker-pin"></div>
          <div class="marker-label">${index + 1}. ${escapeHtml(marker.label)}</div>
        `;

        markersLayer.appendChild(el);
      });
    }

    function renderAll() {
      updateStageSize();
      renderMarkers();
    }

    function startApiRefresh() {
      markerApi.startAutoRefresh((loadedMarkers) => {
        markers = loadedMarkers;
        renderAll();
      });
    }

    function zoomTo(nextZoom, keepCenter = true) {
      const prevZoom = zoom;
      const minAllowedZoom = getMinAllowedZoom();
      const targetZoom = clamp(Number(nextZoom.toFixed(2)), minAllowedZoom, MAX_ZOOM);
      if (targetZoom === prevZoom) return;

      const centerX = viewport.scrollLeft + viewport.clientWidth / 2;
      const centerY = viewport.scrollTop + viewport.clientHeight / 2;
      const imageX = centerX / prevZoom;
      const imageY = centerY / prevZoom;

      zoom = targetZoom;
      renderAll();

      if (keepCenter) {
        viewport.scrollLeft = imageX * zoom - viewport.clientWidth / 2;
        viewport.scrollTop = imageY * zoom - viewport.clientHeight / 2;
      }
    }

    function resetToFit() {
      fitZoom = Math.max(MIN_ZOOM, Number(getFitZoom().toFixed(4)));
      zoom = fitZoom;
      renderAll();
      centerViewport();
    }

    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
      if (e.deltaY < 0) {
        zoomTo(zoom + ZOOM_STEP);
      } else {
        zoomTo(zoom - ZOOM_STEP);
      }
    }, { passive: false });

    viewport.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragMoved = false;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      startScrollLeft = viewport.scrollLeft;
      startScrollTop = viewport.scrollTop;
      viewport.classList.add("dragging");
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
        dragMoved = true;
      }
      viewport.scrollLeft = startScrollLeft - dx;
      viewport.scrollTop = startScrollTop - dy;
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
      viewport.classList.remove("dragging");
      setTimeout(() => {
        dragMoved = false;
      }, 0);
    });

    mapImage.src = ACTUAL_IMAGE_SRC;

    viewport.addEventListener("dblclick", (e) => {
      e.preventDefault();
      resetToFit();
    });

    window.addEventListener("resize", () => {
      fitZoom = Math.max(MIN_ZOOM, Number(getFitZoom().toFixed(4)));

      if (zoom < fitZoom) {
        zoom = fitZoom;
        renderAll();
        centerViewport();
      }
    });

    requestAnimationFrame(() => {
      fitZoom = Math.max(MIN_ZOOM, Number(getFitZoom().toFixed(4)));
      zoom = fitZoom;
      renderAll();
      centerViewport();
      startApiRefresh();
    });

    window.addEventListener("beforeunload", () => {
      markerApi.stopAutoRefresh();
    });
  </script>
</body>
</html>

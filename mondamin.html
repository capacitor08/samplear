<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Map Marker App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      height: 100vh;
      gap: 10px;
      padding: 10px;
    }

    .map-panel {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .viewport {
      height: 85vh;
      overflow: auto;
      border: 1px solid #ccc;
      cursor: grab;
    }

    .viewport.dragging {
      cursor: grabbing;
    }

    .stage {
      position: relative;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      background: red;
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 5px;
    }

    .controls {
      margin-bottom: 10px;
    }

    button {
      margin-right: 5px;
    }

    .side {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- MAP -->
  <div class="map-panel">

    <div class="controls">
      <button id="zoomInBtn">Zoom In</button>
      <button id="zoomOutBtn">Zoom Out</button>
      <button id="resetBtn">Reset</button>
      <button id="loadBtn">Load JSON</button>
      <button id="exportBtn">Export JSON</button>
      <input type="file" id="loadInput" style="display:none"/>
      <span id="zoomText"></span>
    </div>

    <div id="viewport" class="viewport">
      <div id="stage" class="stage">
        <img id="mapImage"/>
        <div id="markersLayer"></div>
      </div>
    </div>

  </div>

  <!-- SIDE -->
  <div class="side">
    <h3>Markers</h3>
    <div id="markerList"></div>
  </div>

</div>

<!-- MODULES -->
<script src="markerApi.js"></script>
<script src="markerJson.js"></script>
<script src="mapViewport.js"></script>

<script>

const IMAGE_WIDTH = 2048;
const IMAGE_HEIGHT = 1280;
const IMAGE_SRC = "mondamin_map.png";

const API_URL = "https://capacitor08.github.io/samplear/api/markers_xy.json";

let markers = [];
let selectedId = null;

// DOM
const viewport = document.getElementById("viewport");
const stage = document.getElementById("stage");
const mapImage = document.getElementById("mapImage");
const markersLayer = document.getElementById("markersLayer");
const zoomText = document.getElementById("zoomText");

mapImage.src = IMAGE_SRC;

// =====================
// MODULE INIT
// =====================

const markerApi = MarkerApi.create({
  apiUrl: API_URL,
  imageWidth: IMAGE_WIDTH,
  imageHeight: IMAGE_HEIGHT
});

const markerJson = MarkerJson.create({
  imageName: IMAGE_SRC,
  imageWidth: IMAGE_WIDTH,
  imageHeight: IMAGE_HEIGHT,
  normalizeMarkers: markerApi.normalizeMarkers
});

const mapViewport = MapViewport.create({
  viewport,
  stage,
  mapImage,
  imageWidth: IMAGE_WIDTH,
  imageHeight: IMAGE_HEIGHT,

  onClick: ({x, y}) => {
    addMarker({
      id: uid(),
      label: "Marker",
      x: Math.round(x),
      y: Math.round(y)
    });
  },

  onZoomChange: (z) => {
    zoomText.innerText = Math.round(z * 100) + "%";
  }
});

// =====================
// MARKERS
// =====================

function uid() {
  return Math.random().toString(36).slice(2);
}

function renderMarkers() {
  markersLayer.innerHTML = "";

  markers.forEach(m => {
    const el = document.createElement("div");
    el.className = "marker";
    el.style.left = (m.x * mapViewport.getZoom()) + "px";
    el.style.top = (m.y * mapViewport.getZoom()) + "px";
    el.innerText = m.label;
    markersLayer.appendChild(el);
  });
}

function addMarker(m) {
  markers.push(m);
  renderMarkers();
}

// =====================
// API REFRESH
// =====================

function startApi() {
  markerApi.startAutoRefresh((serverMarkers) => {
    markers = serverMarkers;
    renderMarkers();
  });
}

// =====================
// EVENTS
// =====================

zoomInBtn.onclick = mapViewport.zoomIn;
zoomOutBtn.onclick = mapViewport.zoomOut;
resetBtn.onclick = mapViewport.reset;

loadBtn.onclick = () => loadInput.click();

loadInput.onchange = (e) => {
  const file = e.target.files[0];
  markerJson.loadMarkersFromFile(file, (data) => {
    markers = data;
    renderMarkers();
  });
};

exportBtn.onclick = () => {
  markerJson.exportMarkers(markers);
};

// =====================
// INIT
// =====================

requestAnimationFrame(() => {
  mapViewport.reset();
  startApi();
});

</script>

</body>
</html>

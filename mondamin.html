<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Map Marker</title>

<style>
body { margin:0; font-family:Arial; }

.container {
  display:flex;
  height:100vh;
}

.map {
  flex:2;
  padding:10px;
}

.side {
  flex:1;
  padding:10px;
  background:#f3f4f6;
}

.viewport {
  height:85vh;
  overflow:auto;
  border:1px solid #ccc;
  cursor:grab;
}

.viewport.dragging { cursor:grabbing; }

.stage { position:relative; }

.marker {
  position:absolute;
  transform:translate(-50%,-100%);
  background:red;
  color:white;
  padding:2px 6px;
  font-size:12px;
}
</style>

</head>

<body>

<div class="container">

<div class="map">

<button id="zoomInBtn">+</button>
<button id="zoomOutBtn">-</button>
<button id="resetBtn">Reset</button>
<button id="loadBtn">Load</button>
<button id="exportBtn">Export</button>
<input type="file" id="loadInput" style="display:none">

<span id="zoomText"></span>

<div id="viewport" class="viewport">
  <div id="stage" class="stage">
    <img id="mapImage">
    <div id="markersLayer"></div>
  </div>
</div>

</div>

<div class="side">
<h3>Markers</h3>
<div id="list"></div>
</div>

</div>

<script src="markerApi.js"></script>
<script src="markerJson.js"></script>

<script>

// ================= CONFIG =================
const IMAGE_WIDTH = 2048;
const IMAGE_HEIGHT = 1280;
const IMAGE_SRC = "mondamin_map.png";
const API_URL = "https://capacitor08.github.io/samplear/api/markers_xy.json";

// ================= STATE =================
let zoom = 1;
let fitZoom = 1;
let markers = [];

let isDragging = false;
let dragStartX = 0;
let dragStartY = 0;
let startScrollLeft = 0;
let startScrollTop = 0;
let dragMoved = false;

// ================= DOM =================
const viewport = document.getElementById("viewport");
const stage = document.getElementById("stage");
const mapImage = document.getElementById("mapImage");
const markersLayer = document.getElementById("markersLayer");
const zoomText = document.getElementById("zoomText");

mapImage.src = IMAGE_SRC;

// ================= MODULES =================
const markerApi = MarkerApi.create({
  apiUrl: API_URL,
  imageWidth: IMAGE_WIDTH,
  imageHeight: IMAGE_HEIGHT
});

const markerJson = MarkerJson.create({
  imageName: IMAGE_SRC,
  imageWidth: IMAGE_WIDTH,
  imageHeight: IMAGE_HEIGHT,
  normalizeMarkers: markerApi.normalizeMarkers
});

// ================= UTIL =================
function clamp(v,min,max){ return Math.min(max,Math.max(min,v)); }
function uid(){ return Math.random().toString(36).slice(2); }

// ================= ZOOM =================
function getFitZoom(){
  return Math.min(
    viewport.clientWidth/IMAGE_WIDTH,
    viewport.clientHeight/IMAGE_HEIGHT
  );
}

function updateStage(){
  stage.style.width = (IMAGE_WIDTH*zoom)+"px";
  stage.style.height = (IMAGE_HEIGHT*zoom)+"px";

  mapImage.style.width = (IMAGE_WIDTH*zoom)+"px";
  mapImage.style.height = (IMAGE_HEIGHT*zoom)+"px";

  zoomText.innerText = Math.round(zoom*100)+"%";
}

function center(){
  viewport.scrollLeft = (IMAGE_WIDTH*zoom - viewport.clientWidth)/2;
  viewport.scrollTop = (IMAGE_HEIGHT*zoom - viewport.clientHeight)/2;
}

function zoomTo(z){
  const prev = zoom;
  const min = fitZoom;

  zoom = clamp(z,min,5);
  if(zoom===prev) return;

  const cx = viewport.scrollLeft + viewport.clientWidth/2;
  const cy = viewport.scrollTop + viewport.clientHeight/2;

  const ix = cx/prev;
  const iy = cy/prev;

  updateStage();

  viewport.scrollLeft = ix*zoom - viewport.clientWidth/2;
  viewport.scrollTop = iy*zoom - viewport.clientHeight/2;
}

function reset(){
  fitZoom = getFitZoom();
  zoom = fitZoom;
  updateStage();
  center();
}

// ================= MARKERS =================
function renderMarkers(){
  markersLayer.innerHTML="";
  markers.forEach(m=>{
    const el=document.createElement("div");
    el.className="marker";
    el.style.left=(m.x*zoom)+"px";
    el.style.top=(m.y*zoom)+"px";
    el.innerText=m.label;
    markersLayer.appendChild(el);
  });
}

function addMarker(x,y){
  markers.push({id:uid(),label:"M",x,y});
  renderMarkers();
}

// ================= API =================
function startApi(){
  markerApi.startAutoRefresh(data=>{
    markers=data;
    renderMarkers();
  });
}

// ================= EVENTS =================
zoomInBtn.onclick=()=>zoomTo(zoom+0.25);
zoomOutBtn.onclick=()=>zoomTo(zoom-0.25);
resetBtn.onclick=reset;

viewport.addEventListener("wheel",e=>{
  e.preventDefault();
  zoomTo(zoom + (e.deltaY<0?0.25:-0.25));
},{passive:false});

viewport.addEventListener("mousedown",e=>{
  isDragging=true;
  dragMoved=false;
  dragStartX=e.clientX;
  dragStartY=e.clientY;
  startScrollLeft=viewport.scrollLeft;
  startScrollTop=viewport.scrollTop;
  viewport.classList.add("dragging");
});

window.addEventListener("mousemove",e=>{
  if(!isDragging)return;
  const dx=e.clientX-dragStartX;
  const dy=e.clientY-dragStartY;

  if(Math.abs(dx)>3||Math.abs(dy)>3) dragMoved=true;

  viewport.scrollLeft=startScrollLeft-dx;
  viewport.scrollTop=startScrollTop-dy;
});

window.addEventListener("mouseup",()=>{
  isDragging=false;
  viewport.classList.remove("dragging");
});

mapImage.addEventListener("click",e=>{
  if(dragMoved) return;

  const rect=mapImage.getBoundingClientRect();
  const x=(e.clientX-rect.left)/zoom;
  const y=(e.clientY-rect.top)/zoom;

  addMarker(Math.round(x),Math.round(y));
});

// JSON
loadBtn.onclick=()=>loadInput.click();

loadInput.onchange=e=>{
  markerJson.loadMarkersFromFile(e.target.files[0],data=>{
    markers=data;
    renderMarkers();
  });
};

exportBtn.onclick=()=>markerJson.exportMarkers(markers);

// resize
window.addEventListener("resize",()=>{
  const newFit=getFitZoom();
  if(zoom<newFit){
    zoom=newFit;
    updateStage();
    center();
  }
});

// ================= INIT =================
requestAnimationFrame(()=>{
  reset();
  startApi();
});

</script>

</body>
</html>

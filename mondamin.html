<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Map Marker App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    .map-page {
      width: 100vw;
      height: 100dvh;
      padding: 8px;
    }

    .map-panel {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .map-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #fff;
      cursor: grab;
      user-select: none;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
    }

    .map-viewport.dragging {
      cursor: grabbing;
    }

    .map-stage {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: top left;
    }

    .map-image {
      display: block;
      max-width: none;
      -webkit-user-drag: none;
      user-select: none;
      pointer-events: auto;
      touch-action: none;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: none;
    }

    .marker-pin {
      width: 18px;
      height: 18px;
      border-radius: 50% 50% 50% 0;
      background: #dc2626;
      transform: rotate(-45deg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      margin: 0 auto;
      position: relative;
    }

    .marker-pin::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      top: 5px;
      left: 5px;
    }

    .marker-label {
      margin-top: 6px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
  </style>
</head>

<body>

<div class="map-page">
  <div class="map-panel">
    <div id="viewport" class="map-viewport">
      <div id="stage" class="map-stage">
        <img id="mapImage" class="map-image" />
        <div id="markersLayer"></div>
      </div>
    </div>
  </div>
</div>

<script src="markerApi.js"></script>

<script>

const IMAGE_WIDTH = 2048;
const IMAGE_HEIGHT = 1280;
const IMAGE_SRC = "mondamin_map.png";
const API_URL = "https://capacitor08.github.io/samplear/api/markers_xy.json";

let zoom = 1;
let fitZoom = 1;
let markers = [];

const viewport = document.getElementById("viewport");
const stage = document.getElementById("stage");
const mapImage = document.getElementById("mapImage");
const markersLayer = document.getElementById("markersLayer");

mapImage.src = IMAGE_SRC;

const markerApi = MarkerApi.create({
  apiUrl: API_URL,
  imageWidth: IMAGE_WIDTH,
  imageHeight: IMAGE_HEIGHT
});

function clamp(v,min,max){ return Math.min(max,Math.max(min,v)); }

function getFitZoom(){
  return Math.min(
    viewport.clientWidth / IMAGE_WIDTH,
    viewport.clientHeight / IMAGE_HEIGHT
  );
}

function updateStage(){
  const w = IMAGE_WIDTH * zoom;
  const h = IMAGE_HEIGHT * zoom;

  stage.style.width = w + "px";
  stage.style.height = h + "px";

  mapImage.style.width = w + "px";
  mapImage.style.height = h + "px";
}

function centerViewport() {
  const contentWidth = IMAGE_WIDTH * zoom;
  const contentHeight = IMAGE_HEIGHT * zoom;

  const viewportWidth = viewport.clientWidth;
  const viewportHeight = viewport.clientHeight;

  if (contentWidth < viewportWidth) {
    stage.style.left = ((viewportWidth - contentWidth) / 2) + "px";
  } else {
    stage.style.left = "0px";
    viewport.scrollLeft = (contentWidth - viewportWidth) / 2;
  }

  if (contentHeight < viewportHeight) {
    stage.style.top = ((viewportHeight - contentHeight) / 2) + "px";
  } else {
    stage.style.top = "0px";
    viewport.scrollTop = (contentHeight - viewportHeight) / 2;
  }
}

function renderMarkers(){
  markersLayer.innerHTML="";
  markers.forEach(m=>{
    const el=document.createElement("div");
    el.className="marker";
    el.style.left=(m.x * zoom)+"px";
    el.style.top=(m.y * zoom)+"px";

    el.innerHTML = `
      <div class="marker-pin"></div>
      <div class="marker-label">${m.label}</div>
    `;

    markersLayer.appendChild(el);
  });
}

function renderAll(){
  updateStage();
  renderMarkers();
}

function reset(){
  fitZoom = getFitZoom();
  zoom = fitZoom;
  renderAll();
  centerViewport();
}

function zoomTo(z){
  const prev = zoom;
  zoom = clamp(z, fitZoom, 5);

  const cx = viewport.scrollLeft + viewport.clientWidth/2;
  const cy = viewport.scrollTop + viewport.clientHeight/2;

  const ix = cx/prev;
  const iy = cy/prev;

  renderAll();

  viewport.scrollLeft = ix*zoom - viewport.clientWidth/2;
  viewport.scrollTop = iy*zoom - viewport.clientHeight/2;
}

viewport.addEventListener("wheel",e=>{
  e.preventDefault();
  zoomTo(zoom + (e.deltaY<0?0.25:-0.25));
},{passive:false});

let isDragging=false;
let startX=0,startY=0,startL=0,startT=0;

viewport.addEventListener("mousedown",e=>{
  isDragging=true;
  startX=e.clientX;
  startY=e.clientY;
  startL=viewport.scrollLeft;
  startT=viewport.scrollTop;
});

window.addEventListener("mousemove",e=>{
  if(!isDragging) return;
  viewport.scrollLeft = startL - (e.clientX-startX);
  viewport.scrollTop = startT - (e.clientY-startY);
});

window.addEventListener("mouseup",()=> isDragging=false);

function startApi(){
  markerApi.startAutoRefresh(data=>{
    markers=data;
    renderAll();
  });
}

requestAnimationFrame(()=>{
  reset();
  startApi();
});

</script>

</body>
</html>
